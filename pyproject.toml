[tool.uv]
exclude-newer = "1 day"

[tool.pyfltr]
preset = "latest"
rust = true
js-runner = "pnpm"
prettier = true

extend-exclude = [
    "target",
    "node_modules",
    "dist",
]

[tool.typos.default.extend-identifiers]
# FilterOperation の別名（use ... as FO;）
FO = "FO"
# 画像バイリニア補間のy座標インデックス
iy = "iy"

[tool.typos.default.extend-words]
# 論文引用 "ACM Trans. Model. Comput. Simul." の略語
Comput = "Comput"
# Susie プラグイン API 仕様の元々のスペル（lpPrgressCallback）
Prgress = "Prgress"
