name: CI

on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    env:
      # mise・pinact等がGitHub APIを叩く際のレート制限（403）回避
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      # cargo-deny は mise.toml の `aqua:EmbarkStudios/cargo-deny` 指定により
      # mise-action 経由でインストールされ、pyfltr が `mise exec -- cargo-deny` で実行する。
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: mise run setup-ci
      - name: advisory DB の CRLF 変換を防止
        run: git config --global core.autocrlf false
      - run: uvx pyfltr ci --output-format=github-annotations
      - run: pinact run --check
