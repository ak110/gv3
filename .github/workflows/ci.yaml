name: CI

on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      # cargo-deny は mise.toml の `aqua:EmbarkStudios/cargo-deny` 指定により
      # mise-action 経由でインストールされ、pyfltr が `mise exec -- cargo-deny` で実行する。
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: mise run setup-ci
      - name: advisory DB の CRLF 変換を防止
        run: git config --global core.autocrlf false
      - name: pyfltr ci (mise run ci 相当)
        id: ci
        shell: bash
        run: |
          # 失敗時にどの pyfltr コマンドが落ちたかをアノテーション化できるよう jsonl も保存する。
          # jsonl は --output-file へ、人間可読出力は stdout (CI ログ) に振り分けて両方残す。
          # mise.toml の `ci` タスクと等価 (`uvx pyfltr ci`) で、診断ファイル出力のみ追加している。
          uvx pyfltr ci --output-format=jsonl --output-file=pyfltr-output.jsonl
      - name: 失敗時にpyfltr診断結果をアノテーション化
        if: failure() && steps.ci.outcome == 'failure'
        shell: bash
        run: |
          # 失敗時のみ動かすため `set +e` で個々の補助コマンドが落ちても全体を継続させる。
          set +e
          # 必ず1件はアノテーションを残し、診断ステップ自体が動いたことを Annotations パネルで分かるようにする。
          echo "::error file=.github/workflows/ci.yaml,line=1,title=pyfltr diagnostic::diagnostic step started; output below"
          python .github/scripts/pyfltr-annotate.py pyfltr-output.jsonl
          py_rc=$?
          echo "::warning file=.github/workflows/ci.yaml,line=1,title=pyfltr diagnostic::python exit=$py_rc"
          uvx pyfltr show-run latest
          exit 0
      - name: 失敗時のpyfltr出力をアーティファクトに保存
        if: failure() && steps.ci.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pyfltr-output
          path: pyfltr-output.jsonl
          if-no-files-found: warn
          retention-days: 7
      - run: pinact run --check
