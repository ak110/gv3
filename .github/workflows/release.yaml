name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: バージョン番号の更新タイプ
        required: true
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR
        default: PATCH

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    env:
      # mise・pinact等がGitHub APIを叩く際のレート制限（403）回避
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $maxAttempts = 30
          $intervalSec = 20
          for ($i = 1; $i -le $maxAttempts; $i++) {
            $conclusion = gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-suites `
              --jq '.check_suites[] | select(.app.slug == "github-actions") | .conclusion' `
              | Select-Object -First 1
            if ($conclusion -eq "success") {
              Write-Host "CI passed."
              exit 0
            }
            if ($conclusion -and $conclusion -ne "null") {
              # 完了しているが success ではない
              Write-Error "CI failed on this commit (status: $conclusion)."
              exit 1
            }
            Write-Host "CI still running... waiting ${intervalSec}s (attempt $i/$maxAttempts)"
            Start-Sleep -Seconds $intervalSec
          }
          Write-Error "Timed out waiting for CI to complete (waited $($maxAttempts * $intervalSec)s)."
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check for existing release tag
        id: existing
        shell: pwsh
        run: |
          $tag = git tag --points-at HEAD | Where-Object { $_ -match '^v\d+\.' } | Select-Object -First 1
          if ($tag) {
            Write-Host "Found existing tag $tag on HEAD, reusing"
            "version=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT
            "rerun=true" >> $env:GITHUB_OUTPUT
          } else {
            "rerun=false" >> $env:GITHUB_OUTPUT
          }

      - name: Setup tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Configure git identity
        if: steps.existing.outputs.rerun != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: steps.existing.outputs.rerun != 'true'
        id: bump
        shell: pwsh
        run: |
          $content = Get-Content Cargo.toml -Raw
          if ($content -match '(?m)^version = "(\d+)\.(\d+)\.(\d+)"') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3]
          } else {
            throw "version not found in Cargo.toml"
          }

          $bump = "${{ inputs.bump }}"
          switch ($bump) {
            'PATCH' { $patch++ }
            'MINOR' { $minor++; $patch = 0 }
            'MAJOR' { $major++; $minor = 0; $patch = 0 }
          }

          $newVersion = "$major.$minor.$patch"
          $content = $content -replace '(?m)^version = "\d+\.\d+\.\d+"', "version = `"$newVersion`""
          Set-Content Cargo.toml -Value $content -NoNewline

          Write-Output "version=$newVersion" >> $env:GITHUB_OUTPUT
          Write-Host "New version: $newVersion"

      - name: Update Cargo.lock
        if: steps.existing.outputs.rerun != 'true'
        run: cargo generate-lockfile

      - if: steps.existing.outputs.rerun != 'true'
        run: mise run build

      - name: Create release archive
        if: steps.existing.outputs.rerun != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.version }}"
          $zipName = "gv-v$version.zip"
          # Cargo.tomlの[[bin]] name = "ぐらびゅ" によりこの名前で生成される
          Compress-Archive -Path @(
            "target/release/ぐらびゅ.exe",
            "ぐらびゅ.default.toml",
            "ぐらびゅ.keys.default.toml",
            "README.md",
            "LICENSE"
          ) -DestinationPath $zipName

      - name: Update version.json for GitHub Pages
        if: steps.existing.outputs.rerun != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.version }}"
          $json = @{
            tag_name = "v$version"
            download_url = "https://github.com/${{ github.repository }}/releases/download/v$version/gv-v$version.zip"
          } | ConvertTo-Json
          Set-Content -Path "docs/public/version.json" -Value $json

      - name: Commit, tag and push
        if: steps.existing.outputs.rerun != 'true'
        run: |
          git add Cargo.toml Cargo.lock docs/public/version.json
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

      - name: Generate release notes
        run: git cliff --latest --strip header --output CHANGES.md

      - name: Append changelog link
        shell: pwsh
        run: |
          $version = if ("${{ steps.existing.outputs.rerun }}" -eq "true") {
            "${{ steps.existing.outputs.version }}"
          } else {
            "${{ steps.bump.outputs.version }}"
          }
          $tags = git tag --sort=version:refname | Where-Object { $_ -match '^v\d' }
          $prevTag = $tags[-2]
          Add-Content CHANGES.md "`n**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prevTag...v$version"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = if ("${{ steps.existing.outputs.rerun }}" -eq "true") {
            "${{ steps.existing.outputs.version }}"
          } else {
            "${{ steps.bump.outputs.version }}"
          }
          $tag = "v$version"
          $asset = "gv-v$version.zip"
          $exists = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists, skipping"
          } else {
            gh release create $tag $asset --title $tag --notes-file CHANGES.md
          }

      - name: Trigger docs deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yaml
