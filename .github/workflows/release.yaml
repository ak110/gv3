name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "バージョンアップの種類"
        required: true
        type: choice
        options:
          - "バグフィックス"
          - "マイナーバージョンアップ"
          - "メジャーバージョンアップ"

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $maxAttempts = 30
          $intervalSec = 20
          for ($i = 1; $i -le $maxAttempts; $i++) {
            $conclusion = gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-suites `
              --jq '.check_suites[] | select(.app.slug == "github-actions") | .conclusion' `
              | Select-Object -First 1
            if ($conclusion -eq "success") {
              Write-Host "CI passed."
              exit 0
            }
            if ($conclusion -and $conclusion -ne "null") {
              # 完了しているが success ではない
              Write-Error "CI failed on this commit (status: $conclusion)."
              exit 1
            }
            Write-Host "CI still running... waiting ${intervalSec}s (attempt $i/$maxAttempts)"
            Start-Sleep -Seconds $intervalSec
          }
          Write-Error "Timed out waiting for CI to complete (waited $($maxAttempts * $intervalSec)s)."
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        shell: pwsh
        run: |
          $content = Get-Content Cargo.toml -Raw
          if ($content -match '(?m)^version = "(\d+)\.(\d+)\.(\d+)"') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3]
          } else {
            throw "version not found in Cargo.toml"
          }

          $bump = "${{ inputs.bump }}"
          switch ($bump) {
            'バグフィックス'             { $patch++ }
            'マイナーバージョンアップ'   { $minor++; $patch = 0 }
            'メジャーバージョンアップ'   { $major++; $minor = 0; $patch = 0 }
          }

          $newVersion = "$major.$minor.$patch"
          $content = $content -replace '(?m)^version = "\d+\.\d+\.\d+"', "version = `"$newVersion`""
          Set-Content Cargo.toml -Value $content -NoNewline

          Write-Output "version=$newVersion" >> $env:GITHUB_OUTPUT
          Write-Host "New version: $newVersion"

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - run: mise run build

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.version }}"
          $zipName = "gv-v$version.zip"
          # Cargo.tomlの[[bin]] name = "ぐらびゅ" によりこの名前で生成される
          Compress-Archive -Path @(
            "target/release/ぐらびゅ.exe",
            "ぐらびゅ.default.toml",
            "ぐらびゅ.keys.default.toml",
            "README.md",
            "LICENSE"
          ) -DestinationPath $zipName

      - name: Update version.json for GitHub Pages
        shell: pwsh
        run: |
          $version = "${{ steps.bump.outputs.version }}"
          $json = @{
            tag_name = "v$version"
            download_url = "https://github.com/${{ github.repository }}/releases/download/v$version/gv-v$version.zip"
          } | ConvertTo-Json
          Set-Content -Path "docs/public/version.json" -Value $json

      - name: Commit, tag and push
        run: |
          git add Cargo.toml Cargo.lock docs/public/version.json
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" `
            "gv-v${{ steps.bump.outputs.version }}.zip" `
            --title "v${{ steps.bump.outputs.version }}" `
            --generate-notes

      - name: Trigger docs deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yaml
