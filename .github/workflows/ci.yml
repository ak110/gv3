name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny
      - run: pnpm install --frozen-lockfile
      - run: mise run test
