# cargo-deny 設定
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# 脆弱性アドバイザリチェック (v2形式)
version = 2

[licenses]
version = 2
# ライセンス許可リスト
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "0BSD",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
# 個別クレートに対するライセンス例外
exceptions = [
    # sevenz-rust2 → bzip2 → libbz2-rs-sys の bzip2 純正ライセンス
    { name = "libbz2-rs-sys", allow = ["bzip2-1.0.6"] },
    # sevenz-rust2 → ppmd-rust のパブリックドメイン系ライセンス
    { name = "ppmd-rust", allow = ["CC0-1.0", "MIT-0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
