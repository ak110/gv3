[tools]
uv = "latest"
# Windows CI で `rustup component add` が異なるツールチェーンに当たり cargo-clippy が
# 見つからない事象が出ていたため、mise の rust プラグイン経由で components を一緒に
# インストールする (mise が解決した実体ツールチェーン上に確実に component を入れる)。
# パッチバージョンまで明示するのは mise の partial version 解決ミスでローカルと CI の
# Rust が食い違うのを防ぐため。MSRV (Cargo.toml `rust-version`) と整合し、
# rust-toolchain.toml も同じ系列を指定する。
# 1.95 系で `collapsible_match` / `while_let_loop` の clippy 動作変更が入ったが、
# Cargo.toml の `[lints.clippy]` で対象 lint を allow 指定して許容している。
rust = { version = "1.95.0", components = "rustfmt,clippy" }
node = "lts"
# pnpm は corepack 経由で `package.json` の `packageManager` フィールドに従って解決する。
# mise registry 既定 (`aqua:pnpm/pnpm`) は aqua-registry の Windows アセット命名
# (`pnpm-win-x64`) と上流リリース (`pnpm-win32-x64.zip`) の齟齬で pnpm 11.x の
# Windows runner インストールが失敗するため、ツール定義からは外す。
pinact = "latest"
git-cliff = "latest"
actionlint = "latest"
typos = "latest"
# cargo-deny は mise の core registry に存在しない (2026-04-29 時点で
# `mise registry cargo-deny` は "tool not found in registry" を返す) ため、
# aqua バックエンド経由で EmbarkStudios/cargo-deny を取得する。
# pyfltr は `cargo-deny-version` 既定値 (`"latest"`) のまま mise.toml に当該ツール
# 記述がある場合、tool spec を省略して `mise exec -- cargo-deny` を組み立てる。
# core registry へ登録されたら本指定を撤去し既定の mise exec 経由に戻せる。
"aqua:EmbarkStudios/cargo-deny" = "latest"

[tasks.setup]
description = "開発環境のセットアップ"
# rustfmt / clippy の component インストールは mise の `[tools].rust` 側に寄せている。
# cargo-deny は `[tools]` の aqua バックエンド指定で `mise install` 時に解決されるため、
# `cargo install cargo-deny` は重複インストールになるので外している。
# `corepack enable pnpm` は Node.js 同梱の corepack に pnpm のシムを配置させ、
# `package.json` の `packageManager` で固定したバージョンを以降の pnpm 呼び出しで
# 使えるようにする。CI/ローカルともに最初の `pnpm install` の前に必要。
run = [
  "cargo install cargo-edit",
  "corepack enable pnpm",
  "pnpm install",
  "git config --unset core.hooksPath || true",
  "uvx pre-commit install",
]
run_windows = [
  "cargo install cargo-edit",
  "corepack enable pnpm",
  "pnpm install",
  "git config --unset core.hooksPath & exit /b 0",
  "uvx pre-commit install",
]

[tasks.setup-ci]
description = "CI環境のセットアップ (cargo install をスキップ)"
# `[tools].rust` 側で components を指定しているが、Windows CI で mise の rust
# プラグインが components を解決しないことがある (2026-04-29 時点で mise 2026.4.25
# にて再現: ログには "info: downloading 5 components" が出るが、後段で
# `'cargo-clippy.exe' is not installed for the toolchain` エラーになる)。
# mise が設定する RUSTUP_TOOLCHAIN を使い rustup から明示的に冪等補強する。
# corepack については setup タスクのコメント参照。
run = [
  "rustup component add rustfmt clippy",
  "corepack enable pnpm",
  "pnpm install",
]

[tasks.build]
description = "リリースビルド"
run = "cargo build --release"

[tasks.clean]
description = "ビルド成果物の削除"
run = "cargo clean"

[tasks.format]
description = "フォーマット + 軽量lint（開発時の手動実行用。自動修正あり）"
run = [
  "uvx pyfltr fast",
]

[tasks.test]
description = "全チェック実行（これを通過すればコミット可能）"
run = [
  "uvx pyfltr run",
]

[tasks.ci]
description = "CI向け全チェック (差分検知で失敗)"
run = [
  "uvx pyfltr ci",
]

[tasks.update]
description = "依存パッケージの更新"
# `corepack use pnpm@latest` は package.json の `packageManager` フィールドを
# 最新 pnpm のバージョン+ハッシュに書き換える。`pnpm update --latest` は依存のみで
# pnpm 本体のバージョンは更新しないため、両者を組にして依存とランナーを揃える。
# pnpm 本体の更新を先に行ってから依存を更新することで、新しい pnpm の依存解決規則を
# 反映した状態でロックファイルを再生成する。
run = [
  "cargo upgrade --incompatible",
  "cargo update",
  "corepack use pnpm@latest",
  "pnpm update --latest",
  "bash -c 'GITHUB_TOKEN=$(gh auth token) pinact run --update --min-age 1'",
]

[tasks.docs]
description = "ドキュメントのローカルプレビュー"
run = "pnpm run docs:dev"
