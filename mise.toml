[tools]
rust = "1.94"
node = "lts"
pnpm = "latest"
pinact = "latest"

[tasks.setup]
description = "開発環境のセットアップ"
run = [
  "rustup component add rustfmt clippy",
  "cargo install cargo-edit cargo-deny",
  "pnpm install",
  "git config core.hooksPath .githooks",
]

[tasks.setup-ci]
description = "CI環境のセットアップ (cargo install をスキップ)"
run = "pnpm install"

[tasks.build]
description = "リリースビルド"
run = "cargo build --release"

[tasks.clean]
description = "ビルド成果物の削除"
run = "cargo clean"

[tasks.format]
description = "コード整形 + lint (testの軽量版)"
run = [
  "cargo fmt",
  "cargo clippy --all-targets --fix --allow-dirty --allow-staged -- -D warnings",
  "pnpm run lint:fix",
]

[tasks.test]
description = "全チェック (fmt + clippy + test + deny + lint)"
run = [
  "cargo fmt --check",
  "cargo clippy --all-targets -- -D warnings",
  "cargo test",
  "cargo deny check",
  "pnpm run lint",
]

[tasks.update]
description = "依存パッケージの更新"
run = [
  "cargo upgrade",
  "cargo update",
  "pnpm update --latest",
  "bash -c 'GITHUB_TOKEN=$(gh auth token) pinact run --update --min-age 1'",
]

[tasks.docs]
description = "ドキュメントのローカルプレビュー"
run = "pnpm run docs:dev"
