[tools]
uv = "latest"
rust = "1.94"
node = "lts"
pnpm = "latest"
pinact = "latest"
git-cliff = "latest"

[tasks.setup]
description = "開発環境のセットアップ"
run = [
  "rustup component add rustfmt clippy",
  "cargo install cargo-edit cargo-deny",
  "pnpm install",
  "git config --unset core.hooksPath || true",
  "uvx pre-commit install",
]

[tasks.setup-ci]
description = "CI環境のセットアップ (cargo install をスキップ)"
run = [
  "rustup component add rustfmt clippy",
  "pnpm install",
]

[tasks.build]
description = "リリースビルド"
run = "cargo build --release"

[tasks.clean]
description = "ビルド成果物の削除"
run = "cargo clean"

[tasks.format]
description = "コード整形 + 自動修正 (testの軽量版)"
run = [
  "uvx pyfltr fix",
  "uvx pyfltr fast",
]

[tasks.test]
description = "全チェック (pre-commit + pyfltr run)"
env = { SKIP = "pyfltr" }
run = [
  "uvx pre-commit run --all-files",
  "uvx pyfltr run",
]

[tasks.ci]
description = "CI向け全チェック (差分検知で失敗)"
env = { SKIP = "pyfltr" }
run = [
  "uvx pre-commit run --all-files",
  "uvx pyfltr ci",
]

[tasks.update]
description = "依存パッケージの更新"
run = [
  "cargo upgrade --incompatible",
  "cargo update",
  "pnpm update --latest",
  "bash -c 'GITHUB_TOKEN=$(gh auth token) pinact run --update --min-age 1'",
]

[tasks.docs]
description = "ドキュメントのローカルプレビュー"
run = "pnpm run docs:dev"
