[tools]
rust = "1.94"
node = "lts"
pnpm = "latest"

[tasks.setup]
description = "Initial project setup (install deps + configure git hooks)"
run = [
  "rustup component add rustfmt clippy",
  "cargo install cargo-edit cargo-deny",
  "pnpm self-update",
  "pnpm install",
  "git config core.hooksPath .githooks",
]

[tasks.build]
description = "cargo build"
run = "cargo build"

[tasks.build-release]
description = "cargo build --release"
run = "cargo build --release"

[tasks.run]
description = "cargo run"
run = "cargo run -- {{arg(name=\"args\", var=true)}}"

[tasks.clean]
description = "cargo clean"
run = "cargo clean"

[tasks.check]
description = "cargo check (fast compile check)"
run = "cargo check"

[tasks.format]
description = "Auto-fix: fmt + clippy --fix"
run = [
  "cargo fmt",
  "cargo clippy --all-targets --fix --allow-dirty --allow-staged -- -D warnings",
]

[tasks.test]
description = "All checks (fmt + clippy + test + deny + doc lint)"
run = [
  "cargo fmt --check",
  "cargo clippy --all-targets -- -D warnings",
  "cargo test",
  "cargo deny check",
  "pnpm run textlint",
  "pnpm run markdownlint",
  "pnpm run prettier:check",
]

[tasks.update]
description = "Update all dependencies (including major versions)"
run = [
  "cargo upgrade",
  "cargo update",
  "pnpm update --latest",
]

[tasks.docs]
description = "Serve documentation locally (VitePress dev server)"
run = "pnpm run docs:dev"

[tasks.coverage]
description = "cargo llvm-cov (coverage report)"
run = "cargo llvm-cov --html"
